name: Deploy Product Radar V2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare deployment
        run: |
          set +e
          # Create deploy directory
          mkdir -p deploy/data/channels
          
          # Copy output files
          echo "Listing output directory:"
          ls -la output/ || echo "output dir missing"
          cp output/*.html output/*.js deploy/ 2>/dev/null || echo "No HTML/JS files in output"
          cp output/*.css deploy/ 2>/dev/null || true
          cp output/*.json deploy/ 2>/dev/null || true
          cp output/*.csv deploy/ 2>/dev/null || true
          cp output/*.md deploy/ 2>/dev/null || true
          
          # Copy data files for date picker
          if [ -d "data/channels" ]; then
            for f in data/channels/*.json; do
              [ -f "$f" ] && cp "$f" deploy/data/channels/
            done
          fi
          
          echo "Deploy directory contents:"
          ls -la deploy/
          echo "---"
          echo "HTML files:"
          ls deploy/*.html 2>/dev/null || echo "No HTML files!"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - id: deployment
        uses: actions/deploy-pages@v4
