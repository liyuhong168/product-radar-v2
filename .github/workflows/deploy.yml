name: Deploy Product Radar V2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare deployment
        run: |
          set +e
          # Create deploy directory
          mkdir -p deploy/data/channels
          
          # Copy output files
          if [ -d "output" ] && ls output/* 1>/dev/null 2>&1; then
            cp -r output/* deploy/
          else
            echo "Warning: output directory empty or missing"
          fi
          
          # Copy data files for date picker
          if [ -d "data/channels" ]; then
            for f in data/channels/*.json; do
              [ -f "$f" ] && cp "$f" deploy/data/channels/
            done
          fi
          
          echo "Deploy directory contents:"
          ls -la deploy/
          echo "---"
          ls deploy/data/channels/ | head -5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - id: deployment
        uses: actions/deploy-pages@v4
